<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Interno de Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 font-sans min-h-screen flex flex-col">
    <!-- HEADER -->
    <header
      class="bg-[#2e2e2e] text-white px-8 py-4 flex justify-between items-center shadow-lg"
    >
      <h1 class="text-xl font-semibold tracking-wide">
        Portal Técnico Interno
      </h1>
      <span class="text-sm text-[#cd9931] font-medium"> Protótipo v2.0 </span>
    </header>

    <!-- CONTEÚDO -->
    <main class="flex-grow flex items-start justify-center p-6">
      <div class="w-full max-w-4xl">
        <!-- Abas de seleção de pesquisa -->
        <div class="flex border-b mb-6">
          <button id="search-tab-ikro" class="px-4 py-2 font-medium text-[#cd9931] border-b-2 border-[#cd9931] focus:outline-none">IKRO</button>
          <button id="search-tab-notus" class="px-4 py-2 font-medium text-gray-500 border-b-2 border-transparent focus:outline-none">NOTUS</button>
        </div>

        <!-- CARD BUSCA -->
        <div id="ikro-search-card" class="bg-white p-6 rounded-xl shadow-md mb-6">
          <h2 class="text-lg font-semibold mb-4 pb-2 border-b-2 border-[#cd9931] text-[#2e2e2e]">
            Consulta de Produto IKRO
          </h2>

          <div class="flex gap-3">
            <input
              type="text"
              id="searchInput"
              placeholder="Digite o código interno..."
              class="flex-grow px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
            />
            <button
              id="searchButton"
              class="bg-[#cd9931] hover:bg-[#b88322] text-white px-6 py-2 rounded-xl transition font-medium shadow-md"
            >
              Buscar
            </button>
          </div>

          <p id="status-message" class="text-sm text-gray-500 mt-3">
            Carregando dados...
          </p>
        </div>
        <div id="notus-search-card" class="bg-white p-6 rounded-xl shadow-md mb-6 hidden">
          <h2 class="text-lg font-semibold mb-4 pb-2 border-b-2 border-[#cd9931] text-[#2e2e2e]">
            Consulta de Produto NOTUS
          </h2>

          <div class="flex gap-3">
            <input
              type="text"
              id="notusSearchInput"
              placeholder="Digite o código NOTUS..."
              class="flex-grow px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
            />
            <button
              id="notusSearchButton"
              class="bg-[#cd9931] hover:bg-[#b88322] text-white px-6 py-2 rounded-xl transition font-medium shadow-md"
            >
              Buscar
            </button>
          </div>

          <p id="notus-status-message" class="text-sm text-gray-500 mt-3">
            Carregando dados...
          </p>
        </div>

        <!-- RESULTADO -->
        <div
          id="result-container"
          class="bg-white p-6 rounded-xl shadow-md hidden"
        >
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- IMAGEM -->
            <div
              class="flex justify-center items-center bg-gray-50 p-4 rounded-lg border"
            >
              <img id="product-image" class="max-h-72 object-contain hidden" />
              <div id="image-placeholder" class="text-gray-400">Sem imagem</div>
            </div>

            <!-- INFO -->
            <div>
              <h3
                id="product-title"
                class="text-xl font-semibold text-gray-800 mb-3"
              ></h3>

              <div class="space-y-2 text-sm text-gray-700">
                <p><strong>Linha:</strong> <span id="product-line"></span></p>
                <p><strong>Grupo:</strong> <span id="product-group"></span></p>
                <p><strong>Item:</strong> <span id="product-item"></span></p>
                <p>
                  <strong>Preço Bruto:</strong> <span id="product-price"></span>
                </p>
                <div class="mt-4">
                  <p>
                    <strong> Especificação </strong>
                  </p>
                  <div
                    id="product-specification"
                    class="text-sm text-gray-600 space-y-1"
                  ></div>
                </div>
                <div class="mt-4">
                  <h4 class="font-semibold text-gray-800 mb-2">Aplicações</h4>
                  <ul
                    id="product-application"
                    class="text-sm text-gray-600 list-disc list-inside space-y-1"
                  ></ul>
                </div>
              </div>
            </div>
          </div>

          <!-- Abas dos concorrentes -->
          <div class="mt-8 hidden">
            <div class="flex border-b mb-4">
              <button id="tab-ikro" class="px-4 py-2 font-medium text-[#cd9931] border-b-2 border-[#cd9931] focus:outline-none">IKRO</button>
              <button id="tab-notus" class="px-4 py-2 font-medium text-gray-500 border-b-2 border-transparent focus:outline-none">NOTUS</button>
              <button id="tab-notus-mapping" class="px-4 py-2 font-medium text-gray-500 border-b-2 border-transparent focus:outline-none">NOTUS Mapping</button>
            </div>
            <div id="ikro-container" class="bg-gray-50 p-4 rounded-lg border-t-4 border-[#cd9931]"></div>
            <div id="notus-container" class="bg-gray-50 p-4 rounded-lg border-t-4 border-[#cd9931] hidden"></div>
            <div id="notus-mapping-container" class="bg-gray-50 p-4 rounded-lg border-t-4 border-[#cd9931] hidden"></div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
